route:
  receiver: slack
  group_wait: 30s
  group_interval: 5m
  repeat_interval: 3h

receivers:
  - name: slack
    slack_configs:
      # Create a free Slack workspace + "Incoming Webhook" app, then paste
      # the webhook URL here (or override via envsubst/secret at deploy time).
      - api_url: "https://hooks.slack.com/services/REPLACE/WITH/YOUR_WEBHOOK"
        channel: "#techpapy-alerts"
        send_resolved: true
        title: "{{ .CommonAnnotations.summary }}"
        text: "{{ range .Alerts }}{{ .Annotations.summary }}\n{{ end }}"
