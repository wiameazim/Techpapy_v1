global:
  scrape_interval: 15s
  evaluation_interval: 15s

alerting:
  alertmanagers:
    - static_configs:
        - targets: []

rule_files:
  - /etc/prometheus/alerts.yml

scrape_configs:
  - job_name: techpapy-api
    metrics_path: /metrics
    static_configs:
      - targets: ["api:4000"]

  - job_name: prometheus
    static_configs:
      - targets: ["localhost:9090"]
